version: '3.8'

services:
  # NestJS 애플리케이션
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurora-nestjs-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_URL: ${SERVER_URL:-http://localhost:3001}
      SPRING_CHAT_SERVER_URL: ${SPRING_CHAT_SERVER_URL:-http://localhost:8080}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'node', '--version']
      interval: 30s
      timeout: 10s
      retries: 3
