services:
  frontend:
    container_name: frontend-container
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${IMAGE_REPO}:${TAG}
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
    command: npm start
    networks:
      - aurora-network
    restart: unless-stopped


  backend-sp:
    container_name: backend-sp-container
    build:
      context: ./spbackend
      dockerfile: Dockerfile
    image: ${IMAGE_REPO}-backend:${TAG}
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST: ${DB_HOST}
      - DB_PORT: ${DB_PORT}
      - DB_NAME: ${DB_NAME}
      - DB_USERNAME: ${DB_USERNAME}
      - DB_PASSWORD: ${DB_PASSWORD}
      - REDIS_HOST: ${REDIS_HOST}
      - REDIS_PORT: ${REDIS_PORT}
      - REDIS_PASSWORD: ${REDIS_PASSWORD}
      - JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aurora-network
    restart: unless-stopped
  
  postgres:
    image: postgres
    container_name: postgres-container
    environment:
      - POSTGRES_DB: ${DB_NAME}
      - POSTGRES_USER: ${DB_USERNAME}
      - POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aurora-network
    restart: unless-stopped

  redis:
    image: redis
    ports:
      - 6379:6379
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aurora-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - /home/ubuntu/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/certbot/www:/var/www/certbot
      - /home/ubuntu/certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
      - backend-sp
    networks:
      - aurora-network
    restart: unless-stopped

networks:
  aurora-network:
    driver: bridge

volumes:
  pgdata: