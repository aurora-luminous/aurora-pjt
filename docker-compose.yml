services:
  frontend:
    container_name: frontend-container
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${IMAGE_REPO}:${TAG}
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
    command: npm start
    networks:
      - aurora-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - /home/ubuntu/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/certbot/www:/var/www/certbot
      - /home/ubuntu/certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
    networks:
      - aurora-network
    restart: unless-stopped

networks:
  aurora-network:
    driver: bridge