<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediasoup 서버 모니터</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card-title {
      font-size: 0.9em;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .card-value {
      font-size: 3em;
      font-weight: bold;
      color: #667eea;
    }
    .card-unit {
      font-size: 0.8em;
      color: #999;
      margin-left: 5px;
    }
    .status {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: bold;
    }
    .status.ok {
      background: #4CAF50;
      color: white;
    }
    .status.warning {
      background: #FF9800;
      color: white;
    }
    .status.error {
      background: #f44336;
      color: white;
    }
    .details {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .details h2 {
      color: #667eea;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .room-item {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #667eea;
    }
    .room-header {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    .peer-item {
      background: white;
      border-radius: 6px;
      padding: 10px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .peer-id {
      font-weight: bold;
      color: #667eea;
    }
    .peer-stats {
      display: flex;
      gap: 15px;
      font-size: 0.9em;
      color: #666;
    }
    .stat-badge {
      background: #e0e7ff;
      padding: 3px 10px;
      border-radius: 12px;
      color: #667eea;
      font-weight: 600;
    }
    .refresh-info {
      text-align: center;
      color: white;
      margin-top: 20px;
      font-size: 0.9em;
    }
    .timestamp {
      text-align: center;
      color: rgba(255,255,255,0.8);
      margin-top: 10px;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 mediasoup 서버 모니터</h1>

    <div class="grid">
      <div class="card">
        <div class="card-title">Workers</div>
        <div class="card-value" id="workers">0</div>
      </div>
      <div class="card">
        <div class="card-title">Active Rooms</div>
        <div class="card-value" id="rooms">0</div>
      </div>
      <div class="card">
        <div class="card-title">Connected Peers</div>
        <div class="card-value" id="peers">0</div>
      </div>
      <div class="card">
        <div class="card-title">Active Transports</div>
        <div class="card-value" id="transports">0</div>
      </div>
      <div class="card">
        <div class="card-title">Producers</div>
        <div class="card-value" id="producers">0</div>
      </div>
      <div class="card">
        <div class="card-title">Consumers</div>
        <div class="card-value" id="consumers">0</div>
      </div>
    </div>

    <div class="details">
      <h2>Room 상세 정보</h2>
      <div id="roomDetails">데이터 로딩 중...</div>
    </div>

    <div class="refresh-info">
      자동 갱신 중... (3초마다)
    </div>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api/ex/voice/stats';

    async function fetchStats() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        updateStats(data);
      } catch (error) {
        console.error('Failed to fetch stats:', error);
        document.getElementById('roomDetails').innerHTML =
          '<div style="color: red;">⚠️ 서버 연결 실패. 서버가 실행 중인지 확인하세요.</div>';
      }
    }

    function updateStats(data) {
      const summary = data.summary;

      document.getElementById('workers').textContent = summary.totalWorkers;
      document.getElementById('rooms').textContent = summary.totalRooms;
      document.getElementById('peers').textContent = summary.totalPeers;
      document.getElementById('transports').textContent = summary.totalTransports;
      document.getElementById('producers').textContent = summary.totalProducers;
      document.getElementById('consumers').textContent = summary.totalConsumers;

      document.getElementById('timestamp').textContent =
        `마지막 업데이트: ${new Date(data.timestamp).toLocaleTimeString('ko-KR')}`;

      updateRoomDetails(data.rooms);
    }

    function updateRoomDetails(rooms) {
      const container = document.getElementById('roomDetails');

      if (rooms.length === 0) {
        container.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">활성화된 Room이 없습니다.</div>';
        return;
      }

      let html = '';
      rooms.forEach(room => {
        html += `
          <div class="room-item">
            <div class="room-header">
              🎤 Channel ${room.channelPk}
              <span style="font-size: 0.8em; color: #666;">(${room.peersCount} peers)</span>
            </div>
        `;

        if (room.peers.length === 0) {
          html += '<div style="color: #999; font-size: 0.9em;">참가자 없음</div>';
        } else {
          room.peers.forEach(peer => {
            html += `
              <div class="peer-item">
                <div class="peer-id">👤 User ${peer.userId}</div>
                <div class="peer-stats">
                  <span class="stat-badge">🚚 ${peer.transportsCount}</span>
                  <span class="stat-badge">📤 ${peer.producersCount}</span>
                  <span class="stat-badge">📥 ${peer.consumersCount}</span>
                </div>
              </div>
            `;
          });
        }

        html += '</div>';
      });

      container.innerHTML = html;
    }

    // 초기 로드
    fetchStats();

    // 3초마다 갱신
    setInterval(fetchStats, 3000);
  </script>
</body>
</html>
