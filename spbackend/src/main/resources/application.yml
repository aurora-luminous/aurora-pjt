spring:
  application:
    name: aurora

  # PostgreSQL 설정
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 3600000 # 1시간 (밀리초)
  refresh-token-validity: 604800000 # 7일 (밀리초)

# 서버 설정
server:
  port: 8080

# 로깅 설정
logging:
  level:
    com.luminous.aurora: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

cookie:
  secure: true
  same-site: Strict

internal:
  secret: ${INTERNAL_SECRET}